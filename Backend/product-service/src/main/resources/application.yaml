spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/product_db}

mongock:
  migration-scan-package: com.music.product_service.migration

internal:
  secret: ${INTERNAL_SECRET:dev-internal-secret-change-me}

server:
  port: ${SERVER_PORT:8083}
  tomcat:
    max-http-header-size: 1048576

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
