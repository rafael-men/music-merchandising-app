spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: mongodb://mongodb:27017/product_db

mongock:
  migration-scan-package: com.music.product_service.migration
  mongo-db:
    connection-string: mongodb://mongodb:27017
    database-name: product_db

internal:
  secret: dev-internal-secret-change-me

server:
  port: 8083
  tomcat:
    max-http-header-size: 1048576

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true
