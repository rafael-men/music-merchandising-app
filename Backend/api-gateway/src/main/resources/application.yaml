spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/users/**
          - id: product-service
            uri: lb://product-service
            predicates:
              - Path=/products/**
          - id: cart-service
            uri: lb://cart-service
            predicates:
              - Path=/cart/**
          - id: order-service
            uri: lb://order-service
            predicates:
              - Path=/orders/**
          - id: notification-service
            uri: lb://notification-service
            predicates:
              - Path=/notifications/**
server:
  port: ${SERVER_PORT:8080}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
