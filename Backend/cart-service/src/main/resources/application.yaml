spring:
  application:
    name: cart-service
  data:
    mongodb:
      uri: mongodb://mongodb:27017/cart_db

mongock:
  migration-scan-package: com.music.cart_service.migration
  mongo-db:
    connection-string: mongodb://mongodb:27017
    database-name: cart_db

internal:
  secret: dev-internal-secret-change-me

server:
  port: 8082
  tomcat:
    max-http-header-size: 1048576

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true
